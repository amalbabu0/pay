<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3;url=https://amalbabu.xyz" />
  <title>Email Authentication Completed</title>
  <style>
    :root {
      --ink: #18212f;
      --muted: #667085;
      --green: #087f73;
      --green-soft: #e3f5f1;
      --line: #dde3ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: #f5f7fa;
    }

    .card {
      width: min(440px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(24, 33, 47, 0.08);
      padding: 40px 32px;
      text-align: center;
    }

    .check {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--green-soft);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check svg {
      width: 36px;
      height: 36px;
      stroke: var(--green);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      font-weight: 800;
    }

    p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .redirect-note {
      margin-top: 18px;
      font-size: 0.85rem;
    }

    a.button {
      display: inline-block;
      margin-top: 22px;
      padding: 11px 22px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
    }

    a.button:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </svg>
    </div>
    <h1>Email Authentication Completed</h1>
    <p>Your email has been verified successfully.</p>
    <p class="redirect-note">Redirecting you to <strong>amalbabu.xyz</strong> in a few seconds&hellip;</p>
    <a class="button" href="https://amalbabu.xyz">Continue now</a>
  </main>

  <script>
    setTimeout(function () {
      window.location.href = "https://amalbabu.xyz";
    }, 3000);
  </script>
</body>
</html>
